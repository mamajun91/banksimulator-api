services:
  banksimulator-db:
    image: postgres:16
    container_name: banksimulator-db
    environment:
      POSTGRES_DB: banksimulator
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  banksimulator-api:
    image: quarkus/banksimulator-api-jvm
    container_name: banksimulator-api
    ports:
      - "8081:8081"
    depends_on:
      - banksimulator-db
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://banksimulator-db:5432/banksimulator
      QUARKUS_DATASOURCE_USERNAME: bank
      QUARKUS_DATASOURCE_PASSWORD: bank

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8083:8080"
    depends_on:
      - banksimulator-db

volumes:
  pgdata: